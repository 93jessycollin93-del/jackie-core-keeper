name: Secrets Safety Audit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Blocks deploys when the secrets safety checker finds hardcoded tokens,
# VITE_* secret leaks, or risky env usage in the frontend bundle.
jobs:
  audit:
    name: Scan frontend for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Jackie secrets safety check
        run: node scripts/secrets-ci-check.mjs
        env:
          # Flip to "1" to fail on warnings too.
          JACKIE_SECRETS_STRICT: "0"
